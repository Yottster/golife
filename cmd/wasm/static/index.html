<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Go Wasm Game of Life</title>
    <script src="wasm_exec.js"></script>
    <script>
        // 1. Create the Go instance
        const go = new Go();

        // 2. Fetch and Stream the Wasm
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            // 3. Run the instance
            go.run(result.instance);
        });
    </script>
</head>
<body>
	<canvas id="canvas"></canvas>
</body>
</html>
